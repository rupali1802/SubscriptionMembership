<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Memberio</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-brand">
      <div class="brand-logo">Membership<span>Subscription</span></div>
      <div class="brand-tagline">
        <h1>Manage memberships with ease</h1>
        <p>A clean, powerful subscription engine built for modern SaaS.</p>
      </div>
      <div class="brand-features">
        <div class="brand-feat">Automatic expiry tracking</div>
        <div class="brand-feat">Secure JWT authentication</div>
        <div class="brand-feat">INR pricing, India-ready</div>
        <div class="brand-feat">Real-time plan dashboard</div>
      </div>
    </div>
    <div class="auth-form-wrap">
      <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Don't have an account? <a href="/register">Sign up free</a></p>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" onclick="handleLogin()">Sign in</button>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/script.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard';

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return showToast('Please fill in all fields.', 'warn');
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) return showToast(data.message, 'error');
        localStorage.setItem('token', data.token);
        localStorage.setItem('userName', data.name);
        showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/dashboard', 1000);
      } catch { showToast('Network error.', 'error'); }
    }
  </script>
</body>
</html>
